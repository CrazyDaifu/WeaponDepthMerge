name: Publish release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release Win32
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installation) { throw 'Visual Studio C++ toolchain not found.' }
          $msbuild = Join-Path $installation 'MSBuild\Current\Bin\MSBuild.exe'

          & $msbuild .\weapon_depth_merge.vcxproj /t:Rebuild /restore `
            /p:Configuration=Release `
            /p:Platform=Win32 `
            /p:PlatformToolset=v143 `
            /p:WindowsTargetPlatformVersion=10.0 `
            /m
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify PE32 and exports
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Get-ChildItem -Path (Join-Path $installation 'VC\Tools\MSVC') -Filter dumpbin.exe -Recurse |
            Where-Object { $_.FullName -match 'Hostx64\\x64\\dumpbin\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { throw 'dumpbin.exe not found.' }

          $binary = '.\build\WeaponDepthMerge.addon32'
          $headers = (& $dumpbin /headers $binary | Out-String)
          $exports = (& $dumpbin /exports $binary | Out-String)
          if ($headers -notmatch '14C machine \(x86\)') { throw 'Binary is not PE32/x86.' }
          if ($exports -notmatch '\bNAME\b' -or $exports -notmatch '\bDESCRIPTION\b') { throw 'Required ReShade exports are missing.' }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath '.\build\WeaponDepthMerge.addon32').Hash
          "$hash *WeaponDepthMerge.addon32" | Set-Content -Encoding ASCII '.\build\SHA256SUMS.txt'

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: WeaponDepthMerge-1.0-release
          if-no-files-found: error
          retention-days: 30
          path: |
            build/WeaponDepthMerge.addon32
            build/SHA256SUMS.txt

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/WeaponDepthMerge.addon32
            build/SHA256SUMS.txt
